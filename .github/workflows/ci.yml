name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jobforge
          POSTGRES_PASSWORD: jobforge
          POSTGRES_DB: jobforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ANTHROPIC_API_KEY: sk-ci-placeholder
      DATABASE_URL: postgresql+asyncpg://jobforge:jobforge@localhost:5432/jobforge
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install deps
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('uv.lock') }}
      - name: Install Chromium for Playwright
        run: uv run playwright install --with-deps chromium
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Test
        run: uv run pytest -q
