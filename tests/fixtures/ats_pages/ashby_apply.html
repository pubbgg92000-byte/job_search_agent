<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ashby — Apply (mock)</title>
</head>
<body>
  <div id="root">
    <h1>Apply — Staff Engineer</h1>
    <form id="application-form" method="post" action="/ashby/submit" enctype="multipart/form-data">
      <label>
        First Name
        <input type="text" name="firstName" aria-label="First Name" required>
      </label>
      <label>
        Last Name
        <input type="text" name="lastName" aria-label="Last Name" required>
      </label>
      <label>
        Email
        <input type="email" name="email" aria-label="Email" required>
      </label>
      <label>
        Phone
        <input type="tel" name="phone">
      </label>
      <label>
        Location
        <input type="text" name="location">
      </label>
      <label>
        LinkedIn URL
        <input type="url" name="linkedinUrl">
      </label>
      <label>
        Resume
        <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
      </label>
      <label>
        Cover Letter
        <input type="file" name="coverLetter" accept=".pdf,.doc,.docx">
      </label>
      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
