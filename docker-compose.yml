services:
  postgres:
    image: postgres:16
    container_name: jobforge-postgres
    environment:
      POSTGRES_USER: jobforge
      POSTGRES_PASSWORD: jobforge
      POSTGRES_DB: jobforge
    ports:
      - "5434:5432"
    volumes:
      - jobforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobforge -d jobforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jobforge_pgdata:
